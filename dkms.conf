PACKAGE_NAME="mt76"
PACKAGE_VERSION="1.0"
BUILD_EXCLUSIVE_KERNEL="^(6\.[6-9]\.|6\.1[0-9]\.|7\.)"
AUTOINSTALL=yes
MAKE="KVER=${kernelver} 'make' modules"
CLEAN="KVER=${kernelver} 'make' clean"

# --- Module list ---
#
# Root-level modules and always-built subdirectory modules first,
# then PCI-conditional and SDIO-conditional modules appended below.

_NAMES=()
_LOCS=()

# Root: core and libraries (always built)
_NAMES+=("mt76_git");              _LOCS+=("")
_NAMES+=("mt76_usb_git");          _LOCS+=("")
_NAMES+=("mt76x02_lib_git");       _LOCS+=("")
_NAMES+=("mt76x02_usb_git");       _LOCS+=("")
_NAMES+=("mt76_connac_lib_git");   _LOCS+=("")
_NAMES+=("mt792x_lib_git");        _LOCS+=("")
_NAMES+=("mt792x_usb_git");        _LOCS+=("")

# mt7615: common + USB (always built)
_NAMES+=("mt7615_common_git");            _LOCS+=("mt7615/")
_NAMES+=("mt7663_usb_sdio_common_git");   _LOCS+=("mt7615/")
_NAMES+=("mt7663u_git");                  _LOCS+=("mt7615/")

# mt7921: common + USB (always built)
_NAMES+=("mt7921_common_git");     _LOCS+=("mt7921/")
_NAMES+=("mt7921u_git");           _LOCS+=("mt7921/")

# mt7925: common + USB (always built)
_NAMES+=("mt7925_common_git");     _LOCS+=("mt7925/")
_NAMES+=("mt7925u_git");           _LOCS+=("mt7925/")

# mt76x0: common + USB (always built)
_NAMES+=("mt76x0_common_git");    _LOCS+=("mt76x0/")
_NAMES+=("mt76x0u_git");          _LOCS+=("mt76x0/")

# mt76x2: common + USB (always built)
_NAMES+=("mt76x2_common_git");    _LOCS+=("mt76x2/")
_NAMES+=("mt76x2u_git");          _LOCS+=("mt76x2/")

# PCI modules (conditional on CONFIG_PCI)
if [ -e "/lib/modules/${kernelver}/build/.config" ] && \
   grep -q "CONFIG_PCI=y" "/lib/modules/${kernelver}/build/.config"; then
	# mt7603e_git is not built by default -- see Makefile note
	#_NAMES+=("mt7603e_git");       _LOCS+=("mt7603/")
	_NAMES+=("mt7615e_git");       _LOCS+=("mt7615/")
	_NAMES+=("mt7915e_git");       _LOCS+=("mt7915/")
	_NAMES+=("mt7921e_git");       _LOCS+=("mt7921/")
	_NAMES+=("mt7925e_git");       _LOCS+=("mt7925/")
	_NAMES+=("mt7996e_git");       _LOCS+=("mt7996/")
	_NAMES+=("mt76x0e_git");      _LOCS+=("mt76x0/")
	_NAMES+=("mt76x2e_git");      _LOCS+=("mt76x2/")
fi

# SDIO modules (conditional on CONFIG_MMC)
if [ -e "/lib/modules/${kernelver}/build/.config" ] && \
   grep -q "CONFIG_MMC=[ym]" "/lib/modules/${kernelver}/build/.config"; then
	_NAMES+=("mt76_sdio_git");     _LOCS+=("")
	_NAMES+=("mt7663s_git");       _LOCS+=("mt7615/")
	_NAMES+=("mt7921s_git");       _LOCS+=("mt7921/")
fi

# Assign to DKMS arrays
for i in "${!_NAMES[@]}"; do
	BUILT_MODULE_NAME[$i]="${_NAMES[$i]}"
	if [ -n "${_LOCS[$i]}" ]; then
		BUILT_MODULE_LOCATION[$i]="${_LOCS[$i]}"
	fi
	DEST_MODULE_LOCATION[$i]="/updates/dkms/mt76"
done
